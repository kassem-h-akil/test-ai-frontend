# Cloud Build pipeline for the TestAI frontend (Vite + React) on Cloud Run.
#
# Required one-time setup in your GCP project:
#   1. Enable APIs: run.googleapis.com, cloudbuild.googleapis.com,
#      artifactregistry.googleapis.com.
#   2. Create an Artifact Registry repo (matches _AR_REPO below):
#        gcloud artifacts repositories create testai \
#          --repository-format=docker --location=us-central1
#   3. Grant the Cloud Build service account the roles:
#        run.admin, iam.serviceAccountUser, artifactregistry.writer
#
# Override _API_BASE_URL with your deployed backend URL, e.g.:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_API_BASE_URL=https://testai-backend-xxxx-uc.a.run.app/api

substitutions:
  _SERVICE_NAME: testai-frontend
  _REGION: us-central1
  _AR_REPO: testai
  _API_BASE_URL: 'https://testai-backend-125441287300.us-central1.run.app/api'   # e.g. https://testai-backend-xxxx-uc.a.run.app/api

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - VITE_API_BASE_URL=${_API_BASE_URL}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:latest
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:latest

options:
  logging: CLOUD_LOGGING_ONLY
